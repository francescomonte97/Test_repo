<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    #eventbrite-button {
      background-color: #D1410C;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    #eventbrite-button:hover {
      background-color: #b8370a;
    }
  </style>
</head>
<body>

  <h1>Evento Test</h1>
  <p>Partecipa al nostro evento! Clicca qui sotto per acquistare il biglietto.</p>

  <!-- NOSCRIPT fallback -->
  <noscript>
    <a href="https://www.eventbrite.com/e/test-1-tickets-1988670413741" target="_blank">
      Acquista biglietti su Eventbrite
    </a>
  </noscript>

  <!-- Bottone personalizzato -->
  <button id="eventbrite-button">
    Acquista biglietto
  </button>

  <!-- Script Eventbrite -->
  <script src="https://www.eventbrite.it/static/widgets/eb_widgets.js"></script>

  <script>
    var exampleCallback = function() {
      console.log('Ordine completato.');
    };

    window.EBWidgets.createWidget({
      widgetType: 'checkout',
      eventId: '1988670413741',
      modal: true,
      modalTriggerElementId: 'eventbrite-button',
      themeSettings: {
        brandColor: '#D1410C',
        fontColor: '#000000',
        background: '#FFFFFF'
      },
      onOrderComplete: exampleCallback
    });
  </script>

</body>
</html>
